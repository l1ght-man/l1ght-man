name: Generate Snake Animations

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Snake Animations
        uses: Platane/snk@v3
        with:
          github_user_name: l1ght-man
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=orange&color_dots=#7ee787,#3fb950,#2ea043,#238636,#0e4429

      - name: Push to main branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: main
          keep_files: true
